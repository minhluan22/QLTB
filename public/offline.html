<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có kết nối | QLTB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 20px;
        }
        .offline-icon { font-size: 5rem; margin-bottom: 1rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .card-offline {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
        }
        .btn-retry {
            background: #1a73e8; border: none;
            color: #fff; padding: 12px 32px;
            border-radius: 10px; font-size: 1rem;
            cursor: pointer; transition: opacity .2s;
        }
        .btn-retry:hover { opacity: .85; }
    </style>
</head>
<body>
    <div class="card-offline">
        <div class="offline-icon">📡</div>
        <h1 style="font-size:1.5rem; font-weight:700;">Không có kết nối</h1>
        <p style="color:#94a3b8; font-size:.9rem; margin:16px 0 24px;">
            Bạn đang offline. Vui lòng kiểm tra kết nối mạng và thử lại.
        </p>
        <button class="btn-retry" onclick="window.location.reload()">
            🔄 Thử lại
        </button>
        <div style="margin-top:20px; font-size:.8rem; color:#475569;">
            QLTB - Hệ thống Quản Lý Thiết Bị
        </div>
    </div>
</body>
</html>
